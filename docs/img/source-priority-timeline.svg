<svg viewBox="0 0 840 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Fallback timeline with three sources: Backup 1 takes over after Preferred is silent for Fallback after, then Backup 2 takes over after Backup 1 is also silent for its Fallback after. Each wait is measured from whichever source was last winning.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="0" y="0" width="10" height="10" fill="#2e7d32" rx="2"/>
  <text x="16" y="9" font-size="10" fill="#555">accepted (winning)</text>
  <rect x="150" y="0" width="10" height="10" fill="#bdbdbd" rx="2"/>
  <text x="166" y="9" font-size="10" fill="#555">ignored (not winning)</text>
  <rect x="305" y="0" width="10" height="10" fill="#1565c0" rx="2"/>
  <text x="321" y="9" font-size="10" fill="#555">accepted (takeover)</text>

  <!-- Track labels -->
  <text x="0" y="56" font-size="12" fill="#333" font-weight="600">Preferred</text>
  <text x="0" y="106" font-size="12" fill="#333" font-weight="600">Backup 1</text>
  <text x="0" y="156" font-size="12" fill="#333" font-weight="600">Backup 2</text>

  <!-- ============ Preferred track ============ -->
  <!-- Active bars then silent -->
  <rect x="80"  y="48" width="30" height="16" fill="#2e7d32" rx="2"/>
  <rect x="118" y="48" width="30" height="16" fill="#2e7d32" rx="2"/>
  <rect x="156" y="48" width="30" height="16" fill="#2e7d32" rx="2"/>
  <rect x="194" y="48" width="30" height="16" fill="#2e7d32" rx="2"/>
  <rect x="232" y="48" width="30" height="16" fill="#2e7d32" rx="2"/>
  <line x1="262" y1="56" x2="800" y2="56" stroke="#b71c1c" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="531" y="45" font-size="11" fill="#b71c1c" text-anchor="middle">(silent)</text>

  <!-- ============ Backup 1 track ============ -->
  <!-- Sending throughout, but ignored while Preferred sends, then wins, then also goes silent -->
  <rect x="80"  y="98" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="118" y="98" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="156" y="98" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="194" y="98" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="232" y="98" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="270" y="98" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="308" y="98" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="346" y="98" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="384" y="98" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <!-- accepted / takes over at T=15s after Preferred -->
  <rect x="442" y="98" width="30" height="16" fill="#1565c0" rx="2"/>
  <rect x="480" y="98" width="30" height="16" fill="#1565c0" rx="2"/>
  <rect x="518" y="98" width="30" height="16" fill="#1565c0" rx="2"/>
  <!-- Backup 1 goes silent -->
  <line x1="548" y1="106" x2="800" y2="106" stroke="#b71c1c" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="674" y="95" font-size="11" fill="#b71c1c" text-anchor="middle">(silent)</text>

  <!-- ============ Backup 2 track ============ -->
  <!-- Always sending, always ignored until Backup 1 has been silent for 15s -->
  <rect x="80"  y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="118" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="156" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="194" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="232" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="270" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="308" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="346" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="384" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="442" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="480" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="518" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="560" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="598" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="636" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <rect x="674" y="148" width="30" height="16" fill="#bdbdbd" rx="2"/>
  <!-- accepted — 15s after Backup 1's last value -->
  <rect x="728" y="148" width="30" height="16" fill="#1565c0" rx="2"/>
  <rect x="766" y="148" width="30" height="16" fill="#1565c0" rx="2"/>

  <!-- ============ First threshold arrow: Preferred → Backup 1 ============ -->
  <line x1="262" y1="30" x2="262" y2="185" stroke="#999" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="262" y="24" font-size="10" fill="#555" text-anchor="middle">Preferred silent</text>
  <line x1="442" y1="30" x2="442" y2="185" stroke="#1565c0" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="442" y="24" font-size="10" fill="#1565c0" text-anchor="middle">Backup 1 wins</text>
  <line x1="262" y1="80" x2="442" y2="80" stroke="#555" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="352" y="76" font-size="10" fill="#333" text-anchor="middle">Fallback after (15s)</text>

  <!-- ============ Second threshold arrow: Backup 1 → Backup 2 ============ -->
  <line x1="548" y1="80" x2="548" y2="185" stroke="#999" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="548" y="74" font-size="10" fill="#555" text-anchor="middle">Backup 1 silent</text>
  <line x1="728" y1="130" x2="728" y2="185" stroke="#1565c0" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="728" y="126" font-size="10" fill="#1565c0" text-anchor="middle">Backup 2 wins</text>
  <line x1="548" y1="175" x2="728" y2="175" stroke="#555" stroke-width="1" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  <text x="638" y="171" font-size="10" fill="#333" text-anchor="middle">Fallback after (15s)</text>

  <!-- ============ Time axis ============ -->
  <line x1="80" y1="200" x2="810" y2="200" stroke="#ccc" stroke-width="1"/>
  <text x="810" y="200" font-size="10" fill="#999" text-anchor="end" dy="12">time →</text>

  <!-- ============ Caption ============ -->
  <text x="420" y="240" font-size="11" fill="#333" text-anchor="middle" font-weight="600">
    Each row's Fallback timer starts from the last source that was winning — not from row 1.
  </text>
  <text x="420" y="256" font-size="10" fill="#666" text-anchor="middle">
    Backup 2 waits for Backup 1 to go silent, then 15 s more.  It does NOT kick in 15 s after Preferred.
  </text>
  <text x="420" y="272" font-size="10" fill="#666" text-anchor="middle">
    If Backup 1 keeps sending, Backup 2 never wins — only the next row up in the chain matters.
  </text>
</svg>
